!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="/src/style.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>malecon</title>
  </head>
  <body class="bg-linear-to-br from-slate-900 to-slate-800 h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-lg shadow-2xl p-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Iniciar Sesión</h1>
        
        <div id="message" class="hidden mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg text-center font-medium">
          Ha ingresado exitosamente!
        </div>
        
        <form class="space-y-6" id="loginForm">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input 
              type="email" 
              id="email" 
              placeholder="tu@email.com"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              required
            >
          </div>
          
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
            <input 
              type="password" 
              id="password" 
              placeholder="••••••••"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              required
            >
          </div>

          <div class="flex items-center justify-between">
            <label for="remember" class="flex items-center text-sm text-gray-600">
              <input type="checkbox" id="remember" class="mr-2">
              Recuérdame
            </label>
            <a href="#" class="text-sm text-blue-600 hover:text-blue-700">¿Olvidaste tu contraseña?</a>
          </div>

          <button 
            type="submit" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105"
          >
            Iniciar Sesión
          </button>
        </form>

        <p class="text-center text-gray-600 text-sm mt-6">
          ¿No tienes cuenta? <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">Regístrate aquí</a>
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
